<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Canvas · Epic Web Animation Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: #0b0c0e;
      color: #eef2fb;
      overflow: hidden;
      user-select: none;
    }

    /* Epic gradient accents */
    :root {
      --accent: #6d5cff;
      --accent-glow: rgba(109, 92, 255, 0.3);
      --surface: #14161a;
      --surface-light: #1e2128;
      --border: #2a2e38;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header — sleek */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
    }

    .logo span {
      background: linear-gradient(135deg, #a78bfa, #6d5cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .btn-primary:hover {
      background: #7f6eff;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--surface-light);
      color: #ccd6f0;
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #2a303c;
    }

    /* Main work area */
    .work-area {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Left shape library — glassmorphism style */
    .shape-library {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      overflow-y: auto;
    }

    .library-section {
      margin-bottom: 28px;
    }

    .library-title {
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      color: #7e8494;
      margin-bottom: 16px;
    }

    .shape-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .shape-card {
      aspect-ratio: 1;
      background: var(--surface-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      border: 1px solid var(--border);
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .shape-card:hover {
      border-color: var(--accent);
      background: #282e3a;
      transform: scale(1.05);
      box-shadow: 0 8px 16px rgba(109, 92, 255, 0.15);
    }

    .shape-card canvas {
      width: 70%;
      height: 70%;
      pointer-events: none;
    }

    /* Center canvas stage */
    .canvas-stage {
      flex: 1;
      background: #0f1115;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background-image: 
        linear-gradient(rgba(45, 50, 60, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(45, 50, 60, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    #canvas-container {
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--border);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    #main-canvas {
      display: block;
      background: #1a1d24;
      cursor: default;
    }

    #main-canvas.dragging {
      cursor: grabbing;
    }

    .canvas-overlay {
      position: absolute;
      bottom: 16px;
      right: 20px;
      background: rgba(20, 22, 26, 0.9);
      backdrop-filter: blur(8px);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #b1b9cc;
      border: 1px solid var(--border);
      pointer-events: none;
    }

    /* Right properties panel */
    .properties-panel {
      width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 20px 20px 12px;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9aa1b0;
    }

    .props-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
    }

    .prop-group {
      margin-bottom: 24px;
    }

    .prop-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #b9c0d0;
      margin-bottom: 8px;
    }

    .prop-value {
      color: var(--accent);
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      background: transparent;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 4px;
      background: #2e3440;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px var(--accent);
      border: 2px solid white;
    }

    input[type="color"] {
      width: 100%;
      height: 38px;
      background: var(--surface-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      padding: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Timeline — now at bottom, epic */
    .timeline-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      height: 260px;
      min-height: 260px;
    }

    .timeline-toolbar {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .duration-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .duration-control label {
      color: #9aa1b0;
      font-size: 0.85rem;
    }

    .duration-control input {
      width: 90px;
      padding: 8px 12px;
      background: var(--surface-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: white;
      text-align: center;
    }

    .timeline-controls {
      display: flex;
      gap: 8px;
    }

    .timeline-ruler-container {
      position: relative;
      height: 40px;
      margin-bottom: 8px;
    }

    .timeline-ruler {
      display: flex;
      height: 100%;
      background: #1a1e26;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    .timeline-tick {
      flex: 1 0 auto;
      text-align: center;
      font-size: 0.7rem;
      color: #7a8190;
      padding-top: 12px;
      border-right: 1px solid #2a303c;
      position: relative;
    }

    .timeline-tick:last-child {
      border-right: none;
    }

    .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
      left: 0;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 0 12px var(--accent);
    }

    .timeline-tracks {
      flex: 1;
      overflow-y: auto;
      background: #1a1e26;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 4px 0;
    }

    .track-item {
      display: flex;
      align-items: center;
      height: 40px;
      padding: 0 12px;
      border-bottom: 1px solid #252a34;
      cursor: pointer;
      transition: background 0.1s;
    }

    .track-item:hover {
      background: #222730;
    }

    .track-item.selected {
      background: #2a3140;
      border-left: 3px solid var(--accent);
    }

    .track-color {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      margin-right: 12px;
    }

    .track-name {
      flex: 1;
      font-size: 0.85rem;
    }

    .track-keyframes {
      display: flex;
      gap: 4px;
    }

    .keyframe-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      cursor: pointer;
    }

    /* Empty state */
    .empty-message {
      color: #5f6779;
      text-align: center;
      padding: 40px 20px;
      font-style: italic;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow: auto;
      border: 1px solid var(--border);
      box-shadow: 0 30px 50px rgba(0,0,0,0.7);
    }

    .modal h3 {
      margin-bottom: 16px;
    }

    pre {
      background: #0d0f14;
      padding: 20px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 0.8rem;
      color: #cfd7e6;
      border: 1px solid var(--border);
    }

    .copy-btn {
      margin-top: 20px;
    }

    /* Utility */
    .flex-row {
      display: flex;
      gap: 8px;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="app-header">
    <div class="logo">
      <span>⚡ MOTION CANVAS</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="clearCanvas()">🗑️ Clear</button>
      <button class="btn btn-primary" onclick="exportProject()">📦 Export JSON</button>
    </div>
  </header>

  <!-- Work Area -->
  <div class="work-area">
    <!-- Left: Shape Library -->
    <div class="shape-library">
      <div class="library-section">
        <div class="library-title">Primitives</div>
        <div class="shape-grid">
          <div class="shape-card" draggable="true" data-shape="square">
            <canvas width="40" height="40"></canvas>
          </div>
          <div class="shape-card" draggable="true" data-shape="circle">
            <canvas width="40" height="40"></canvas>
          </div>
          <div class="shape-card" draggable="true" data-shape="oval">
            <canvas width="40" height="40"></canvas>
          </div>
        </div>
      </div>
      <div class="library-section">
        <div class="library-title">Aspect Ratios</div>
        <div class="shape-grid">
          <div class="shape-card" draggable="true" data-shape="rect-16-9">
            <canvas width="40" height="40"></canvas>
          </div>
          <div class="shape-card" draggable="true" data-shape="rect-4-3">
            <canvas width="40" height="40"></canvas>
          </div>
          <div class="shape-card" draggable="true" data-shape="rect-1-1">
            <canvas width="40" height="40"></canvas>
          </div>
        </div>
      </div>
      <div class="library-section">
        <div class="library-title">Advanced</div>
        <div class="shape-grid">
          <div class="shape-card" draggable="true" data-shape="rounded-rect">
            <canvas width="40" height="40"></canvas>
          </div>
          <div class="shape-card" draggable="true" data-shape="triangle">
            <canvas width="40" height="40"></canvas>
          </div>
          <div class="shape-card" draggable="true" data-shape="diamond">
            <canvas width="40" height="40"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Center: Canvas -->
    <div class="canvas-stage">
      <div id="canvas-container">
        <canvas id="main-canvas" width="900" height="600"></canvas>
      </div>
      <div class="canvas-overlay">
        <span id="selection-indicator">No object selected</span>
      </div>
    </div>

    <!-- Right: Properties -->
    <div class="properties-panel">
      <div class="panel-header">Properties</div>
      <div class="props-content" id="properties-content">
        <div class="empty-message">✨ Select a shape to edit</div>
      </div>
    </div>
  </div>

  <!-- Bottom: Timeline -->
  <div class="timeline-panel">
    <div class="timeline-toolbar">
      <div class="duration-control">
        <label>Duration (sec)</label>
        <input type="number" id="timeline-duration" min="1" max="600" value="30" step="1" onchange="updateTimelineDuration()">
      </div>
      <div class="timeline-controls">
        <button class="btn btn-secondary" onclick="addKeyframeAtCurrentTime()">🔑 Add Keyframe</button>
        <button class="btn btn-secondary" onclick="playPreview()">▶ Play</button>
        <button class="btn btn-secondary" onclick="stopPreview()">⏹ Stop</button>
      </div>
      <div style="flex:1; text-align:right; color:#7e8494;" id="time-display">0.0s / 30.0s</div>
    </div>
    <div class="timeline-ruler-container" id="ruler-container">
      <div class="timeline-ruler" id="timeline-ruler"></div>
      <div class="playhead" id="playhead" style="left:0%"></div>
    </div>
    <div class="timeline-tracks" id="timeline-tracks">
      <!-- Tracks populated dynamically -->
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h3>📋 Project JSON (Self‑Explanatory)</h3>
    <pre id="json-preview"></pre>
    <button class="btn btn-primary copy-btn" onclick="copyExportedJSON()">📎 Copy to Clipboard</button>
    <button class="btn btn-secondary" style="margin-left:12px;" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- STATE ----------
    const state = {
      canvasWidth: 900,
      canvasHeight: 600,
      shapes: [],
      selectedId: null,
      timelineDuration: 30, // seconds
      currentTime: 0,
      isDragging: false,
      dragShape: null,
      dragOffsetX: 0,
      dragOffsetY: 0,
      previewInterval: null
    };

    // Shape definitions
    const shapeDefs = {
      square: { type: 'rect', width: 100, height: 100 },
      circle: { type: 'circle', radius: 50, width: 100, height: 100 },
      oval: { type: 'ellipse', radiusX: 60, radiusY: 40, width: 120, height: 80 },
      'rect-16-9': { type: 'rect', width: 160, height: 90 },
      'rect-4-3': { type: 'rect', width: 120, height: 90 },
      'rect-1-1': { type: 'rect', width: 100, height: 100 },
      'rounded-rect': { type: 'rounded-rect', width: 120, height: 80, radius: 20 },
      triangle: { type: 'polygon', points: 3, size: 90, width: 90, height: 90 },
      diamond: { type: 'polygon', points: 4, size: 90, width: 90, height: 90 }
    };

    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');

    // ---------- INITIAL RENDERING ----------
    function drawShapePreviews() {
      document.querySelectorAll('.shape-card').forEach(card => {
        const previewCanvas = card.querySelector('canvas');
        const pCtx = previewCanvas.getContext('2d');
        const shapeType = card.dataset.shape;
        pCtx.clearRect(0,0,40,40);
        pCtx.fillStyle = '#6d5cff';
        pCtx.shadowColor = '#6d5cff80';
        pCtx.shadowBlur = 8;
        switch(shapeType) {
          case 'square': pCtx.fillRect(6,6,28,28); break;
          case 'circle': pCtx.beginPath(); pCtx.arc(20,20,14,0,2*Math.PI); pCtx.fill(); break;
          case 'oval': pCtx.beginPath(); pCtx.ellipse(20,20,14,9,0,0,2*Math.PI); pCtx.fill(); break;
          case 'rect-16-9': pCtx.fillRect(4,10,32,18); break;
          case 'rect-4-3': pCtx.fillRect(6,8,28,21); break;
          case 'rect-1-1': pCtx.fillRect(8,8,24,24); break;
          case 'rounded-rect': pCtx.beginPath(); pCtx.roundRect(6,8,28,24,8); pCtx.fill(); break;
          case 'triangle': pCtx.beginPath(); pCtx.moveTo(20,6); pCtx.lineTo(34,34); pCtx.lineTo(6,34); pCtx.closePath(); pCtx.fill(); break;
          case 'diamond': pCtx.beginPath(); pCtx.moveTo(20,6); pCtx.lineTo(34,20); pCtx.lineTo(20,34); pCtx.lineTo(6,20); pCtx.closePath(); pCtx.fill(); break;
        }
        pCtx.shadowBlur = 0;
      });
    }
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      if(w<2*r) r=w/2; if(h<2*r) r=h/2;
      this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
      this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
      this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
      return this;
    };

    // Draw main canvas
    function redrawCanvas() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      // grid
      ctx.strokeStyle = '#2a303c';
      ctx.lineWidth = 0.6;
      for(let i=0;i<canvas.width;i+=30) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
      for(let i=0;i<canvas.height;i+=30) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
      
      state.shapes.forEach(shape => {
        ctx.save();
        const centerX = shape.x + shape.width/2;
        const centerY = shape.y + shape.height/2;
        ctx.translate(centerX, centerY);
        ctx.rotate((shape.rotation || 0) * Math.PI/180);
        ctx.translate(-centerX, -centerY);
        ctx.globalAlpha = shape.opacity ?? 1;
        ctx.fillStyle = shape.color || '#6d5cff';
        ctx.shadowColor = '#6d5cff40';
        ctx.shadowBlur = shape.id === state.selectedId ? 20 : 8;
        
        if(shape.type === 'circle') {
          ctx.beginPath();
          ctx.arc(shape.x+shape.radius, shape.y+shape.radius, shape.radius, 0, 2*Math.PI);
          ctx.fill();
        } else if(shape.type === 'ellipse') {
          ctx.beginPath();
          ctx.ellipse(shape.x+shape.radiusX, shape.y+shape.radiusY, shape.radiusX, shape.radiusY, 0,0,2*Math.PI);
          ctx.fill();
        } else if(shape.type === 'rounded-rect') {
          ctx.beginPath();
          ctx.roundRect(shape.x, shape.y, shape.width, shape.height, shape.radius||20);
          ctx.fill();
        } else if(shape.type === 'polygon') {
          const cx = shape.x + shape.size/2;
          const cy = shape.y + shape.size/2;
          ctx.beginPath();
          for(let i=0; i<shape.points; i++) {
            const angle = (i*2*Math.PI/shape.points) - Math.PI/2;
            const px = cx + shape.size/2 * Math.cos(angle);
            const py = cy + shape.size/2 * Math.sin(angle);
            if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
          }
          ctx.closePath(); ctx.fill();
        } else {
          ctx.fillRect(shape.x, shape.y, shape.width, shape.height);
        }
        ctx.shadowBlur = 0;
        if(shape.id === state.selectedId) {
          ctx.strokeStyle = '#6d5cff';
          ctx.lineWidth = 2.5;
          ctx.strokeRect(shape.x-2, shape.y-2, shape.width+4, shape.height+4);
        }
        ctx.restore();
      });
      updateSelectionIndicator();
    }

    function updateSelectionIndicator() {
      const sel = state.shapes.find(s=>s.id===state.selectedId);
      document.getElementById('selection-indicator').textContent = sel ? `🎯 ${sel.name}` : 'No object selected';
    }

    // ---------- SHAPE MANAGEMENT ----------
    function addShape(shapeType, x, y) {
      const def = shapeDefs[shapeType];
      const width = def.width, height = def.height;
      const newShape = {
        id: Date.now() + Math.random(),
        type: shapeType,
        name: `${shapeType}-${state.shapes.length+1}`,
        x: x - width/2,
        y: y - height/2,
        width, height,
        opacity: 1,
        rotation: 0,
        color: '#6d5cff',
        fadeIn: 0,
        fadeOut: 0,
        keyframes: [],
        ...def
      };
      state.shapes.push(newShape);
      state.selectedId = newShape.id;
      redrawCanvas();
      renderProperties();
      renderTimeline();
    }

    function deleteSelected() {
      state.shapes = state.shapes.filter(s => s.id !== state.selectedId);
      state.selectedId = null;
      redrawCanvas();
      renderProperties();
      renderTimeline();
    }

    // ---------- PROPERTIES PANEL ----------
    function renderProperties() {
      const container = document.getElementById('properties-content');
      const shape = state.shapes.find(s => s.id === state.selectedId);
      if(!shape) { container.innerHTML = '<div class="empty-message">✨ Select a shape to edit</div>'; return; }
      
      container.innerHTML = `
        <div class="prop-group"><div class="prop-label">Name</div><input type="text" value="${shape.name}" onchange="updateProp('name', this.value)"></div>
        <div class="prop-group"><div class="prop-label">Opacity <span class="prop-value">${Math.round(shape.opacity*100)}%</span></div><input type="range" min="0" max="1" step="0.01" value="${shape.opacity}" oninput="updateProp('opacity', this.value)"></div>
        <div class="prop-group"><div class="prop-label">Rotation <span class="prop-value">${shape.rotation}°</span></div><input type="range" min="0" max="360" value="${shape.rotation}" oninput="updateProp('rotation', this.value)"></div>
        <div class="prop-group"><div class="prop-label">Size <span class="prop-value">${Math.round(shape.width)}px</span></div><input type="range" min="20" max="400" value="${shape.width}" oninput="updateSize(this.value)"></div>
        <div class="prop-group"><div class="prop-label">Color</div><input type="color" value="${shape.color}" onchange="updateProp('color', this.value)"></div>
        ${shape.type==='rounded-rect' ? `<div class="prop-group"><div class="prop-label">Curve <span class="prop-value">${shape.radius}px</span></div><input type="range" min="0" max="60" value="${shape.radius}" oninput="updateProp('radius', this.value)"></div>` : ''}
        <div class="prop-group"><div class="prop-label">Fade In (s)</div><input type="range" min="0" max="3" step="0.1" value="${shape.fadeIn}" oninput="updateProp('fadeIn', this.value)"></div>
        <div class="prop-group"><div class="prop-label">Fade Out (s)</div><input type="range" min="0" max="3" step="0.1" value="${shape.fadeOut}" oninput="updateProp('fadeOut', this.value)"></div>
        <button class="btn btn-secondary" style="width:100%; margin-top:20px;" onclick="deleteSelected()">🗑️ Delete Shape</button>
      `;
    }

    window.updateProp = function(prop, value) {
      const shape = state.shapes.find(s => s.id === state.selectedId);
      if(!shape) return;
      if(prop === 'opacity' || prop === 'rotation' || prop === 'fadeIn' || prop === 'fadeOut' || prop === 'radius')
        shape[prop] = parseFloat(value);
      else shape[prop] = value;
      redrawCanvas();
      renderProperties();
      renderTimeline();
    };

    window.updateSize = function(val) {
      const shape = state.shapes.find(s => s.id === state.selectedId);
      if(!shape) return;
      const scale = parseFloat(val) / shape.width;
      shape.width = parseFloat(val);
      if(shape.height) shape.height *= scale;
      if(shape.radius) shape.radius = shape.width/2;
      redrawCanvas();
      renderProperties();
    };

    // ---------- CANVAS INTERACTION (DRAG) ----------
    function handleMouseDown(e) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      
      const clickedShape = [...state.shapes].reverse().find(s => 
        mouseX >= s.x && mouseX <= s.x+s.width && mouseY >= s.y && mouseY <= s.y+s.height
      );
      if(clickedShape) {
        state.selectedId = clickedShape.id;
        state.isDragging = true;
        state.dragShape = clickedShape;
        state.dragOffsetX = mouseX - clickedShape.x;
        state.dragOffsetY = mouseY - clickedShape.y;
        canvas.classList.add('dragging');
        redrawCanvas();
        renderProperties();
        renderTimeline();
      } else {
        state.selectedId = null;
        redrawCanvas();
        renderProperties();
        renderTimeline();
      }
    }

    function handleMouseMove(e) {
      if(!state.isDragging || !state.dragShape) return;
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      state.dragShape.x = Math.min(canvas.width - state.dragShape.width, Math.max(0, mouseX - state.dragOffsetX));
      state.dragShape.y = Math.min(canvas.height - state.dragShape.height, Math.max(0, mouseY - state.dragOffsetY));
      redrawCanvas();
    }

    function handleMouseUp() {
      state.isDragging = false;
      state.dragShape = null;
      canvas.classList.remove('dragging');
    }

    canvas.addEventListener('mousedown', handleMouseDown);
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);

    // Drag & Drop from library
    canvas.addEventListener('dragover', e => e.preventDefault());
    canvas.addEventListener('drop', e => {
      e.preventDefault();
      const shapeType = e.dataTransfer.getData('text/plain');
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if(shapeType && shapeDefs[shapeType]) addShape(shapeType, x, y);
    });
    document.querySelectorAll('.shape-card').forEach(card => {
      card.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', card.dataset.shape));
    });

    // ---------- TIMELINE ----------
    function updateTimelineDuration() {
      const input = document.getElementById('timeline-duration');
      state.timelineDuration = parseFloat(input.value) || 30;
      renderTimeline();
    }

    function renderTimeline() {
      const ruler = document.getElementById('timeline-ruler');
      const duration = state.timelineDuration;
      const segments = Math.min(20, Math.floor(duration));
      let html = '';
      for(let i=0; i<=segments; i++) {
        const time = (i/segments)*duration;
        html += `<div class="timeline-tick">${time.toFixed(1)}s</div>`;
      }
      ruler.innerHTML = html;
      
      const tracksDiv = document.getElementById('timeline-tracks');
      tracksDiv.innerHTML = state.shapes.map(shape => `
        <div class="track-item ${shape.id === state.selectedId ? 'selected' : ''}" onclick="selectShapeById('${shape.id}')">
          <div class="track-color" style="background:${shape.color}"></div>
          <span class="track-name">${shape.name}</span>
          <div class="track-keyframes">${(shape.keyframes||[]).map(kf => `<span class="keyframe-dot" style="margin-left:${(kf.time/duration)*100}%"></span>`).join('')}</div>
        </div>
      `).join('');
      
      updatePlayhead();
    }

    function updatePlayhead() {
      const playhead = document.getElementById('playhead');
      const percent = (state.currentTime / state.timelineDuration)*100;
      playhead.style.left = percent + '%';
      document.getElementById('time-display').textContent = `${state.currentTime.toFixed(1)}s / ${state.timelineDuration.toFixed(1)}s`;
    }

    window.selectShapeById = function(id) {
      state.selectedId = parseFloat(id);
      redrawCanvas();
      renderProperties();
      renderTimeline();
    };

    window.addKeyframeAtCurrentTime = function() {
      const shape = state.shapes.find(s => s.id === state.selectedId);
      if(!shape) { alert('Select a shape first'); return; }
      if(!shape.keyframes) shape.keyframes = [];
      shape.keyframes.push({
        time: state.currentTime,
        x: shape.x, y: shape.y, opacity: shape.opacity, rotation: shape.rotation, width: shape.width
      });
      renderTimeline();
    };

    // Preview
    window.playPreview = function() {
      if(state.previewInterval) clearInterval(state.previewInterval);
      state.previewInterval = setInterval(() => {
        state.currentTime += 0.1;
        if(state.currentTime >= state.timelineDuration) state.currentTime = 0;
        updatePlayhead();
        // apply keyframes (simple interpolation demo)
      }, 100);
    };
    window.stopPreview = function() {
      if(state.previewInterval) clearInterval(state.previewInterval);
      state.previewInterval = null;
    };

    // ---------- EXPORT ----------
    window.exportProject = function() {
      const exportData = {
        version: "2.0",
        canvas: { width: state.canvasWidth, height: state.canvasHeight },
        duration: state.timelineDuration,
        shapes: state.shapes.map(s => ({
          id: s.id, name: s.name, type: s.type,
          position: { x: s.x, y: s.y },
          size: { width: s.width, height: s.height },
          appearance: { color: s.color, opacity: s.opacity, rotation: s.rotation },
          animation: { fadeIn: s.fadeIn, fadeOut: s.fadeOut, keyframes: s.keyframes },
          _renderHint: `Render ${s.type} at (${s.x},${s.y}) with fade in ${s.fadeIn}s`
        })),
        _schema: "Self-explanatory JSON for WebForge Studio"
      };
      document.getElementById('json-preview').textContent = JSON.stringify(exportData, null, 2);
      document.getElementById('exportModal').style.display = 'flex';
    };
    window.closeModal = () => document.getElementById('exportModal').style.display = 'none';
    window.copyExportedJSON = () => {
      navigator.clipboard.writeText(document.getElementById('json-preview').textContent);
      alert('Copied!');
    };
    window.clearCanvas = () => { state.shapes = []; state.selectedId = null; redrawCanvas(); renderProperties(); renderTimeline(); };

    // Init
    drawShapePreviews();
    redrawCanvas();
    renderTimeline();
    // Add some starter shapes
    addShape('circle', 200, 200);
    addShape('rect-16-9', 400, 250);
    addShape('rounded-rect', 600, 180);
  })();
</script>
</body>
</html>
